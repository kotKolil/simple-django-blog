        <img src="http://127.0.0.1:8000/static/plus.jpeg" style="

        width:30px;
        height:30px;
        position: fixed;
        left: 1px;
        top: 70vh;


        " onclick='
elem = document.getElementById("editor");
var input = document.createElement("input");
input.setAttribute("id", "file_upd");
input.setAttribute("accept", "image/png, image/gif, image/jpeg");
input.type = "file";
input.click()
input.onchange = function() {
    var photo = input.files[0];
    var formData = new FormData();
    formData.append("photo", photo);
    fetch("http://127.0.0.1:8000/upload_image/", { method: "POST", body: formData });
    elem.innerHTML += `<img src="http://127.0.0.1:8000/media/${photo.name}"></img>`


};
'>

        '>
        	<div contentEditable="true" id="editor"></div>
